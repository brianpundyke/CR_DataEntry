name: Nightly ETL Job

on:
  schedule:
    # This runs at 01:00 UTC daily
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  run-etl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Change '3.10' to '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run ETL Script
        env:
          # This maps the GitHub Secret to an Environment Variable the script can see
          CLOUD_DB_URL: ${{ secrets.CLOUD_DB_URL }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          IBOOKFISHING_REPORT_PAGE_URL: ${{ secrets.IBOOKFISHING_REPORT_PAGE_URL }}
          IBOOKFISHING_REPORT_SHSEC: ${{ secrets.IBOOKFISHING_REPORT_SHSEC }}
          IBOOKFISHING_REPORT_CALENDAR_ID: ${{ secrets.IBOOKFISHING_REPORT_CALENDAR_ID }}
          IBOOKFISHING_REPORT_S2: ${{ secrets.IBOOKFISHING_REPORT_S2 }}
        run: python etl_catch_returns_and_reservations_to_supabase.py