<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAC Recent Reservations</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        /* Global Styles */
        body { font-family: sans-serif; background: #f4f7f6; padding: 5px; font-size: 11px; margin: 0; }
        h2 { font-size: 1rem; margin: 5px 0; }
        p { margin: 0 0 10px 0; color: #555; }

        /* Container constrained to viewport to prevent ghost white space on mobile */
        .main-container {
            display: flex;
            max-width: 100vw;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            position: relative;
            overflow: hidden; 
        }

        .names-column {
            width: 108px;
            flex-shrink: 0;
            background: #ecf0f1;
            border-right: 2px solid #bdc3c7;
            z-index: 5;
        }

        .scroll-wrapper {
            flex-grow: 1;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch; 
        }

        .dates-grid {
            display: grid;
            gap: 0;
        }

        .cell {
            height: 20px;
            line-height: 20px;
            border: 0.5px solid #eee;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding: 0 2px;
        }

        .header-cell {
            background: #2980b9;
            color: white;
            font-weight: bold;
            justify-content: center;
            text-align: center;
            font-size: 0.6rem;
        }

        .beat-name-cell {
            justify-content: flex-start;
            padding-left: 4px;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #ecf0f1;
            border-bottom: 0.5px solid #ddd;
            font-size: 0.6rem;
        }

        /* Reserved Cell Styling */
        .fished { 
            background: #e74c3c; 
            color: white; 
            font-weight: bold; 
            font-size: 0.5rem;
            flex-direction: column;
            align-items: flex-start; /* Strictly Left Aligned */
            justify-content: center;
            padding-left: 4px;
            line-height: 1.1;
            position: relative; 
        }
        
        .stat-row {
            display: block;
            text-align: left;
            width: 100%;
        }

        .rested { 
            background: #2ecc71; 
            color: white; 
            opacity: 0.8; 
            justify-content: center; 
            font-size: 0.7rem; 
        }
        
        /* Business-like Comment Icon */
        .comment-icon, .legend-icon {
            width: 7px;
            height: 7px;
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 1px;
            background: rgba(255,255,255,0.1);
            position: relative;
        }
        .comment-icon { position: absolute; top: 2px; right: 2px; }
        .legend-icon { display: inline-block; border-color: #777; vertical-align: middle; margin: 0 2px; }

        .comment-icon::after, .legend-icon::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 1px;
            width: 4px;
            height: 1px;
            background: white;
        }
        .legend-icon::after { background: #777; }

        /* Popup Rectangle Styling */
        .fished .popup-text {
            visibility: hidden;
            width: 150px;
            background-color: #222;
            color: #fff;
            border-radius: 4px;
            padding: 8px;
            position: absolute;
            z-index: 1000;
            bottom: 130%; /* Default: Above cell */
            right: 0;      /* Default: Grow LEFT */
            opacity: 0;
            transition: opacity 0.2s;
            font-weight: normal;
            font-size: 0.7rem;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
            pointer-events: none; 
            white-space: normal;
        }

        /* Edge Awareness Classes */
        .fished.popup-right-grow .popup-text { right: auto; left: 0; } /* Grow RIGHT */
        .fished.popup-bottom .popup-text { bottom: auto; top: 130%; } /* Grow DOWN */

        .fished.has-comments:hover .popup-text, 
        .fished.has-comments:active .popup-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <h2>Recent Beat Reservations</h2>
    <p>Key: Red = Reserved. Green (•) = Rested.
     Hover over (click on mobile) <span class="legend-icon"></span> icons to see member comments.</p>

    <div class="main-container">
        <div id="names-column" class="names-column"></div>
        <div class="scroll-wrapper" id="scroll-container">
            <div id="dates-grid" class="dates-grid"></div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://iwxpxphtqwjowzgzrflh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KWnt1y9tOi7ZXCiTAMl9yQ_s3FmU3Bs'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initGrid() {
        const namesElement = document.getElementById('names-column');
        const datesElement = document.getElementById('dates-grid');
        const scrollContainer = document.getElementById('scroll-container');

        const dates = [];
        for (let i = 10; i >= 1; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toISOString().split('T')[0]);
        }

        const [beatsRes, historyRes] = await Promise.all([
            supabaseClient.from('beats').select('id, beat, river_order').neq('id', '18').order('river_order', { ascending: true }),
            supabaseClient.from('view_members_reserv_and_cr_history').select('beat, date, cr_name, brown_trout, grayling, comments').gte('date', dates[0])
        ]);

        if (beatsRes.error || historyRes.error) {
            namesElement.innerHTML = "<div style='padding:10px'>Error.</div>";
            return;
        }

        const gridData = {};
        historyRes.data.forEach(row => {
            const hasMatch = row.brown_trout !== null || row.grayling !== null;
            gridData[`${row.beat}|${row.date}`] = {
                hasMatch,
                bt: row.brown_trout,
                gy: row.grayling,
                comments: row.comments
            };
        });

        namesElement.innerHTML = `<div class="cell header-cell">Beat</div>`;
        datesElement.innerHTML = '';
        datesElement.style.gridTemplateColumns = `repeat(${dates.length}, 40px)`;

        dates.forEach(date => {
            const displayDate = new Date(date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            datesElement.innerHTML += `<div class="cell header-cell">${displayDate}</div>`;
        });

        beatsRes.data.forEach((b, index) => {
            namesElement.innerHTML += `<div class="cell beat-name-cell" title="${b.beat}">${b.beat}</div>`;
            dates.forEach((date, dateIndex) => {
                const data = gridData[`${b.beat}|${date}`];
                if (data) {
                    let classes = "cell fished";

                    if (index < 3) classes += " popup-bottom";
                    if (dateIndex < 3) classes += " popup-right-grow";

                    let content = "";
                    if (!data.hasMatch) {
                        content = `<span class="stat-row" style="font-size: 0.42rem; margin-top: 1px;">CR Due</span>`;
                    } else {
                        content = `<span class="stat-row">T:${data.bt}</span><span class="stat-row">G:${data.gy}</span>`;
                    }

                    if (data.comments && data.comments.trim() !== "") {
                        classes += " has-comments";
                        content += `<span class="comment-icon"></span>`;
                        content += `<div class="popup-text"><strong>Note:</strong><br>${data.comments}</div>`;
                    }
                    datesElement.innerHTML += `<div class="${classes}">${content}</div>`;
                } else {
                    datesElement.innerHTML += `<div class="cell rested">•</div>`;
                }
            });
        });

        if (scrollContainer) {
            setTimeout(() => { scrollContainer.scrollLeft = scrollContainer.scrollWidth; }, 100);
        }
    }

    initGrid();
</script>
</body>
</html>
