<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAC Recent Reservations</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Global Styles */
        body { font-family: sans-serif; background: #f4f7f6; padding: 5px; font-size: 11px; margin: 0; }
        h2 { font-size: 1rem; margin: 5px 0; }
        p { margin: 0 0 10px 0; color: #555; }

        /* Two-Column Layout Container */
        .main-container {
            display: flex;
            max-width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            overflow: hidden;
        }

        /* Fixed Left Column (Beats) */
        .names-column {
            width: 120px;
            flex-shrink: 0;
            background: #ecf0f1;
            border-right: 2px solid #bdc3c7;
            z-index: 5;
        }

        /* Scrollable Right Column (Dates) */
        .scroll-wrapper {
            flex-grow: 1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }

        .dates-grid {
            display: grid;
            /* Grid columns will be set dynamically in JS */
            gap: 0;
        }

        /* Common Cell Styles */
        .cell {
            height: 20px;
            line-height: 20px;
            border: 0.5px solid #eee;
            text-align: center;
            font-size: 0.7rem;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Headers */
        .header-cell {
            background: #2980b9;
            color: white;
            font-weight: bold;
            height: 22px;
            line-height: 22px;
        }

        /* Beat Name Specifics */
        .beat-name-cell {
            justify-content: flex-start;
            padding-left: 6px;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #ecf0f1;
            border-bottom: 0.5px solid #ddd;
        }

        /* Corner Header (Beat Label) */
        .corner-header {
            background: #ecf0f1;
            color: #2c3e50;
            border-bottom: 2px solid #bdc3c7;
        }

        /* Status Indicators */
        .fished { background: #e74c3c; color: white; font-weight: bold; }
        .fished::after { content: "×"; } 
        .rested { background: #2ecc71; color: white; opacity: 0.8; }
        .rested::after { content: "•"; }
    </style>
</head>
<body>

    <h2>Recent Beat Reservations</h2>
    <p>Key: Red (×) = Reserved. Green (•) = Rested.</p>

    <div class="main-container">
        <div id="names-column" class="names-column">
            <div style="padding: 10px;">Loading...</div>
        </div>
        
        <div class="scroll-wrapper" id="scroll-container">
            <div id="dates-grid" class="dates-grid"></div>
        </div>
    </div>

<script>
    // Configuration
    const SUPABASE_URL = 'https://iwxpxphtqwjowzgzrflh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KWnt1y9tOi7ZXCiTAMl9yQ_s3FmU3Bs'; // Ensure this matches your dashboard
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function initGrid() {
        const namesElement = document.getElementById('names-column');
        const datesElement = document.getElementById('dates-grid');
        const scrollContainer = document.getElementById('scroll-container');

        // 1. Generate Dates (Oldest -> Yesterday)
        const dates = [];
        for (let i = 10; i >= 1; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toISOString().split('T')[0]); 
        }

        // 2. Fetch Data
        const { data: beats, error: beatsError } = await supabaseClient
            .from('beats')
            .select('id, beat, river_order')
            .neq('id', '18')
            .order('river_order', { ascending: true });

        const { data: reservations, error: resError } = await supabaseClient
            .from('view_reservations_confirmed_staging')
            .select('beat, date')
            .gte('date', dates[0]);

        if (beatsError || resError) {
            namesElement.innerHTML = "Error.";
            console.error({ beatsError, resError });
            return;
        }

        // 3. Clear and Setup Grid Layout
        namesElement.innerHTML = `<div class="cell header-cell corner-header">Beat</div>`;
        datesElement.innerHTML = '';
        datesElement.style.gridTemplateColumns = `repeat(${dates.length}, 45px)`;

        // 4. Render Headers
        dates.forEach(date => {
            const displayDate = new Date(date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
            datesElement.innerHTML += `<div class="cell header-cell">${displayDate}</div>`;
        });

        // 5. Render Rows
        beats.forEach(b => {
            // Add to fixed column
            namesElement.innerHTML += `<div class="cell beat-name-cell">${b.beat}</div>`;
            
            // Add status to scrolling grid
            dates.forEach(date => {
                const isFished = reservations.some(r => r.beat === b.beat && r.date === date);
                const statusClass = isFished ? 'fished' : 'rested';
                datesElement.innerHTML += `<div class="cell ${statusClass}"></div>`;
            });
        });

        // 6. Auto-scroll to the right (Yesterday)
        if (scrollContainer) {
            setTimeout(() => {
                scrollContainer.scrollLeft = scrollContainer.scrollWidth;
            }, 100);
        }
    }

    // Handle resize to maintain scroll position
    window.addEventListener('resize', () => {
        const scrollContainer = document.getElementById('scroll-container');
        if (scrollContainer) {
            scrollContainer.scrollLeft = scrollContainer.scrollWidth;
        }
    });

    initGrid();
</script>
</body>
</html>
